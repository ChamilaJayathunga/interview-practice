<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インタビュー れんしゅう - Interview Practice</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  padding: 12px;
  transition: background 0.3s;
}

:root {
  --card-bg: white;
  --card-header: #fff9c4;
  --card-shadow: rgba(0,0,0,0.08);
  --text-primary: #1a1a2e;
  --text-secondary: #555;
  --answer-bg: #e8f5e9;
  --answer-border: #4caf50;
  --search-bg: white;
  --search-border: #ccc;
  --footer-color: #999;
  --overlay-bg: linear-gradient(135deg, #e8f0fe, #fce4ec);
  --input-bg: rgba(255,255,255,0.85);
}

body.dark {
  background: #1a1a2e;
  --card-bg: #2a2a3e;
  --card-header: #3e3a2a;
  --card-shadow: rgba(0,0,0,0.4);
  --text-primary: #e0e0e0;
  --text-secondary: #aaa;
  --answer-bg: #335544;
  --answer-border: #66bb6a;
  --search-bg: #2a2a3e;
  --search-border: #555;
  --footer-color: #666;
  --overlay-bg: linear-gradient(135deg, #1e2a3a, #2a1e2e);
  --input-bg: rgba(40,40,60,0.9);
}

.header {
  text-align: center;
  padding: 24px 16px;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border-radius: 16px;
  margin-bottom: 24px;
  color: white;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.header h1 {
  font-size: 2em;
  margin-bottom: 6px;
  letter-spacing: 1px;
  font-weight: 900;
}

.header p {
  font-size: 1.1em;
  opacity: 0.85;
  font-weight: 600;
}

.container {
  max-width: 740px;
  margin: 0 auto;
}

.search-box {
  margin-bottom: 18px;
}

.search-box input {
  width: 100%;
  padding: 14px 18px;
  border: 2px solid var(--search-border);
  border-radius: 14px;
  font-size: 1em;
  font-family: inherit;
  outline: none;
  background: var(--search-bg);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.search-box input:focus {
  border-color: #0f3460;
  box-shadow: 0 0 0 3px rgba(15,52,96,0.12);
}

.search-box input::placeholder {
  color: var(--text-secondary);
}

.card {
  background: var(--card-bg);
  border-radius: 14px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px var(--card-shadow);
  overflow: hidden;
  color: var(--text-primary);
}

.card-header {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 16px;
  cursor: pointer;
  user-select: none;
  background: var(--card-header);
}

.play-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: #0f3460;
  color: white;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}

.play-btn:hover {
  background: #1a5276;
}

.play-btn:active {
  transform: scale(0.95);
}

.play-btn.playing {
  background: #e74c3c;
}

.copy-btn {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 8px;
  background: transparent;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.15s;
  margin-right: 2px;
}

.copy-btn:hover {
  background: rgba(0,0,0,0.08);
  transform: scale(1.1);
}

.copy-btn:active {
  transform: scale(0.93);
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
  70% { box-shadow: 0 0 0 12px rgba(231, 76, 60, 0); }
  100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
}

.question-label {
  font-size: 1em;
  color: #555;
  font-weight: 900;
  min-width: 36px;
  line-height: 1;
  padding-top: 4px;
  font-family: monospace;
}

.question-text {
  flex: 1;
  font-size: 1.25em;
  line-height: 1.8;
  color: var(--text-primary);
  font-weight: 800;
  letter-spacing: 0.05em;
  word-spacing: 0.2em;
}

.speed-group {
  display: flex;
  gap: 4px;
  flex-shrink: 0;
  align-items: center;
  margin-left: 4px;
}

.speed-btn {
  padding: 6px 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: white;
  font-size: 0.8em;
  font-weight: 700;
  cursor: pointer;
  color: #666;
  transition: all 0.15s;
  line-height: 1;
  -webkit-tap-highlight-color: transparent;
}

.speed-btn:hover {
  background: #eef;
  border-color: #0f3460;
}

.speed-btn.active {
  background: #0f3460;
  color: white;
  border-color: #0f3460;
}

.card-body {
  display: none;
}

.card-body.open {
  display: block;
}

.answer-text {
  font-size: 1.2em;
  line-height: 2;
  color: #111;
  font-weight: 600;
  padding: 12px 16px;
  background: white;
  border-top: 1px solid #eee;
  margin: 0 16px 16px;
  border-radius: 8px;
  letter-spacing: 0.04em;
  word-spacing: 0.15em;
}

.answer-text li {
  list-style: none;
  margin: 0;
  padding: 10px 14px;
  margin-bottom: 6px;
  background: var(--answer-bg);
  border-radius: 8px;
  border-left: 4px solid var(--answer-border);
  line-height: 2;
  letter-spacing: 0.04em;
  word-spacing: 0.15em;
  color: var(--text-primary);
}

.footer {
  text-align: center;
  padding: 20px;
  color: var(--footer-color);
  font-size: 0.75em;
  letter-spacing: 1px;
}

.nav-bar {
  text-align: left;
  margin-bottom: 12px;
}

.nav-bar .nav-btn {
  display: inline-block;
  padding: 8px 18px;
  background: #0f3460;
  color: white;
  text-decoration: none;
  border-radius: 8px;
  font-size: 0.85em;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: background 0.2s;
  border: none;
  cursor: pointer;
  margin-right: 6px;
  font-family: inherit;
}

.nav-bar .nav-btn:hover {
  background: #1a5276;
}

.nav-bar .nav-btn.ai-btn {
  background: #2e7d32;
}

.nav-bar .nav-btn.ai-btn:hover {
  background: #388e3c;
}

.nav-bar .nav-btn.ai-btn:disabled {
  background: #999;
  cursor: not-allowed;
}

.practice-overlay {
  display: none;
  background: var(--overlay-bg);
  border-radius: 20px;
  padding: 32px 24px;
  margin-bottom: 20px;
  box-shadow: 0 6px 30px rgba(0,0,0,0.1);
  text-align: center;
  border: 1px solid rgba(255,255,255,0.5);
}

.practice-overlay.active {
  display: block;
}

.practice-overlay .p-q-label {
  font-size: 0.8em;
  color: var(--text-secondary);
  font-weight: 700;
  font-family: monospace;
  margin-bottom: 12px;
}

.practice-overlay .p-question {
  font-size: 1.5em;
  font-weight: 800;
  line-height: 2;
  color: var(--text-primary);
  margin-bottom: 24px;
  letter-spacing: 0.08em;
  word-spacing: 0.3em;
}

.practice-overlay .p-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.practice-overlay .p-btn {
  padding: 12px 28px;
  border: none;
  border-radius: 10px;
  font-size: 0.95em;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  font-family: inherit;
}

.practice-overlay .p-btn:active {
  transform: scale(0.96);
}

.practice-overlay .p-btn.speak {
  background: #2e7d32;
  color: white;
}

.practice-overlay .p-btn.speak:hover { background: #388e3c; }
.practice-overlay .p-btn.speak.listening { background: #e74c3c; animation: pulse 1.2s infinite; }

.practice-overlay .p-btn.answer-btn {
  background: #0f3460;
  color: white;
}

.practice-overlay .p-btn.answer-btn:hover { background: #1a5276; }

.practice-overlay .p-btn.next-btn {
  background: #f5f5f5;
  color: #333;
}

.practice-overlay .p-btn.next-btn:hover { background: #e0e0e0; }

.practice-overlay .p-btn.close-btn {
  background: transparent;
  color: #999;
  padding: 8px;
  font-size: 1.2em;
}

.practice-overlay .p-search-box {
  margin-bottom: 16px;
}

.practice-overlay .p-search-box input {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid rgba(67, 160, 71, 0.3);
  border-radius: 10px;
  font-size: 0.9em;
  outline: none;
  font-family: inherit;
  box-sizing: border-box;
  background: var(--input-bg);
  color: var(--text-primary);
}

.practice-overlay .p-search-box input:focus {
  border-color: #43a047;
  background: var(--input-bg);
  color: var(--text-primary);
}

.practice-overlay .p-answer {
  margin-top: 20px;
  display: none;
}

.practice-overlay .p-answer.show {
  display: block;
}

.p-answer-sentence {
  padding: 10px 16px;
  margin-bottom: 8px;
  background: var(--answer-bg);
  border-radius: 10px;
  border-left: 4px solid var(--answer-border);
  text-align: left;
  font-size: 1.15em;
  line-height: 1.9;
  font-weight: 600;
  letter-spacing: 0.04em;
  word-spacing: 0.15em;
  color: var(--text-primary);
}

.practice-overlay .p-status {
  margin-top: 12px;
  font-size: 0.85em;
  color: var(--text-secondary);
  font-weight: 500;
}

.p-btn.speak-answer {
  background: #1565c0;
  color: white;
}

.p-btn.speak-answer:hover { background: #1976d2; }

.p-btn.speak-answer:disabled { background: #aaa; cursor: not-allowed; }
.p-btn.speak:disabled { background: #aaa; cursor: not-allowed; }

.p-speed {
  margin-top: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}

.p-speed-label {
  font-size: 0.75em;
  color: #999;
  font-weight: 600;
  margin-right: 4px;
}

.p-speed-btn {
  width: 36px;
  height: 36px;
  border: 2px solid #ddd;
  border-radius: 50%;
  background: white;
  color: #333;
  font-size: 1.2em;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
  font-family: inherit;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.p-speed-btn:hover {
  border-color: #2e7d32;
  color: #2e7d32;
  background: #e8f5e9;
}

.p-speed-btn:active {
  background: #2e7d32;
  color: white;
}

.p-speed-value {
  font-size: 1em;
  font-weight: 800;
  color: var(--answer-border);
  min-width: 44px;
  text-align: center;
  font-family: monospace;
}

.theme-toggle {
  text-align: right;
  margin-bottom: 8px;
}

.theme-toggle button {
  background: transparent;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  width: 40px;
  height: 40px;
  font-size: 1.2em;
  cursor: pointer;
  transition: background 0.2s, transform 0.2s;
  line-height: 1;
  padding: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.theme-toggle button:hover {
  background: rgba(255,255,255,0.1);
  transform: scale(1.1);
}

body.dark .theme-toggle button {
  border-color: rgba(255,255,255,0.5);
}

@media (max-width: 520px) {
  body { padding: 6px; }
  .header { padding: 16px 10px; border-radius: 10px; }
  .header h1 { font-size: 1.3em; }
  .header p { font-size: 0.85em; }
  .card { border-radius: 10px; margin-bottom: 10px; }
  .card-header { flex-wrap: wrap; padding: 10px; gap: 6px; }
  .play-btn { width: 40px; height: 40px; font-size: 16px; }
  .q-label { line-height: 40px; }
  .question-text { font-size: 1.05em; width: 100%; order: 10; }
  .speed-group { width: 100%; justify-content: flex-end; order: 11; }
  .answer-text { font-size: 1em; margin: 0 8px 8px; padding: 10px 12px; }

  .practice-overlay { padding: 20px 14px; max-height: 85vh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .practice-overlay .p-question { font-size: 1.15em; }
  .practice-overlay .p-btn { padding: 10px 16px; font-size: 0.85em; min-height: 44px; }
  .practice-overlay .p-actions { gap: 6px; }
  .practice-overlay .p-speed { margin-top: 10px; }
  .p-speed-btn { width: 44px; height: 44px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>インタビュー れんしゅう</h1>
    <p>Interview Practice &mdash; 音声を 聞いて こたえよう</p>
  </div>

  <div class="theme-toggle">
    <button id="themeBtn">🌙</button>
  </div>

  <div class="nav-bar">
    <a href="main quiz.html" class="nav-btn">メイン クイズ →</a>
    <button class="nav-btn ai-btn" id="aiBtn">🎤 AI Practice</button>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="🔍 Search questions... (日本語・ローマ字・English)" autocomplete="off">
  </div>

  <div class="practice-overlay" id="practiceOverlay">
    <div class="p-search-box">
      <input type="text" id="pSearchInput" placeholder="🔍 Search questions in practice..." autocomplete="off">
    </div>
    <div class="p-q-label" id="pLabel">Q1</div>
    <div class="p-question" id="pQuestion">Question appears here</div>
    <div class="p-actions">
      <button class="p-btn speak" id="pSpeak">🔊 Speak Question</button>
      <button class="p-btn answer-btn" id="pAnswer">📖 Show Answer</button>
      <button class="p-btn speak-answer" id="pSpeakAnswer">🔊 Speak Answer</button>
      <button class="p-btn next-btn" id="pNext">➡ Next</button>
      <button class="p-btn close-btn" id="pClose">✕</button>
    </div>
    <div class="p-speed">
      <span class="p-speed-label">Speed: </span>
      <button class="p-speed-btn" id="pSpeedDown">−</button>
      <span class="p-speed-value" id="pSpeedValue">1.0×</span>
      <button class="p-speed-btn" id="pSpeedUp">+</button>
    </div>
    <div class="p-answer" id="pAnswerText"></div>
    <div class="p-status" id="pStatus">Press "Speak Question" to hear the AI ask</div>
  </div>

  <div id="questions"></div>

  <div class="footer">Q1-40.4 &middot; めんせつ しつもん と こたえ</div>
</div>

<script>
const questions = [
  {
    file: "1.m4a",
    label: "1",
    question: "なぜ にほん で はたらきたい です か。",
    answer: "わたし は にほん の おもてなし や すばらしい サービス に きょうみ が あります 。\nおきゃくさま に よろこんで いただける ような サービス の ぎじゅつ を まなびたい と おもいます 。\nその ため にほん を えらびました 。"
  },
  {
    file: "2.m4a",
    label: "2",
    question: "なぜ しゅくはく の しごと を えらびました か。",
    answer: "わたし は ひと と はなす の が すき です 。（コミュニケーションを とって、よい かんけいを つくりたいからです。）\nまた にほん の おもてなし を まなびたい と おもいます 。\nおきゃくさま に えがお で かえって いただける ような サービス を したい です 。\nその ため この しゅくはく ぎょう を えらびました 。"
  },
  {
    file: "2.2.m4a",
    label: "2.2",
    question: "おもてなし と は なん です か。",
    answer: "おきゃくさま を こころ から かんげい して さいこう の サービス を する こと です 。"
  },
  {
    file: "3.m4a",
    label: "3",
    question: "しゅくはく と は なん です か。",
    answer: "おきゃくさま が ホテル や りょかん に とまる こと です 。\nあんしん で かいてきな じかん を つくる こと が たいせつ です 。\n1\n\n-- 1 of 2 --"
  },
  {
    file: "4.m4a",
    label: "4",
    question: "しごと で いちばん たいせつな こと は なん です か。",
    answer: "おきゃくさま を まんぞく させたり チーム で きょうりょく したり する こと が たいせつ だと おもいます 。\nなかま と きょうりょく して おきゃくさま に さいこう の サービス を ていきょう したい です 。\nおきゃくさま に また きたい と おもって いただける ように えがお で ていねい に たいおう したい です 。"
  },
  {
    file: "5.m4a",
    label: "5",
    question: "にほん は どんな くに だと おもいます か。",
    answer: "ぎじゅつ が たかくて まち が とても きれいな くに です 。\nひとびと が しんせつ で れいぎ ただしい です 。"
  },
  {
    file: "5.1.m4a",
    label: "5.1",
    question: "にほん に ついて しっている こと を おしえて ください。",
    answer: "ぎじゅつ が すばらしくて にほんじん は とても まじめ です 。\nそして おもてなし の サービス が ゆうめい です 。"
  },
  {
    file: "7.m4a",
    label: "7",
    question: "にほん に は どのぐらい いたい です か。",
    answer: "まず は とくてい ぎのう で 5ねんかん しっかり はたらきたい です 。\nチャンス が あれば もっと ながく いたい です 。"
  },
  {
    file: "10.m4a",
    label: "10",
    question: "ストレス が あった とき どう します か。",
    answer: "しごと が いそ가しい とき に ストレス を かんじます 。\nその とき は おちついて けいかくてき に しごと を します 。\n2\n\n-- 2 of 2 --"
  },
  {
    file: "11.m4a",
    label: "11",
    question: "にほん の せいかつ で なに が たいへん だと おモいますか。",
    answer: "にほんご の かいわ や かぞく と はなれる さびしさ が たいへん だと おもいます が、がんばって のりこえます。"
  },
  {
    file: "11.2.m4a",
    label: "11.2",
    question: "にほん の せいかつ で しんぱいな ことは なんですか。",
    answer: "ふゆ の さむさが すこし しんぱいです。\nあたたかい ふくを じゅんびして がんばります。"
  },
  {
    file: "12.m4a",
    label: "12",
    question: "にほん で いきたい ばしょ や たべたい ものは ありますか。",
    answer: "いきたい ばしょは ぐんまけんです。おんせんに いきたいです。\nたべたい ものは ラーメン と すしです。"
  },
  {
    file: "13.1.m4a",
    label: "13.1",
    question: "あなた の ちょうしょ を おしえて ください。",
    answer: "わたし の ちょうしょは せきにんかんが ある ところです。\nまかせた しごとを さいごまで やりとげます。\nあと あたらしい ことを はやく まなべます。（たとえば、ホテルの システムや マナーを はやく おぼえられます。）\nREASON\nいぜん ＩＴ や でんしききの しごとを したとき むずかしい もんだいが おきても あわてずに れいせいに たいおうし かいけつ することが できました。\nこの ちょうしょを いかして にほんでも せきにんを もって はたらきたいです。"
  },
  {
    file: "13.2.m4a",
    label: "13.2",
    question: "あなた の たんしょ を おしえて ください。",
    answer: "わたし の たんしょは しごとに しゅうちゅう しすぎる ところです。\nいまは じかんの バランス を いしき しながら しごとを するように こころがけています。\nREASON\nひとつ ひとつの しごとを きにしすぎるて じかんが かかる ことが あるからです。"

const container = document.getElementById('questions');
let currentAudio = null;
let currentBtn = null;

questions.forEach((q) => {
  const card = document.createElement('div');
  card.className = 'card';

  const header = document.createElement('div');
  header.className = 'card-header';

  const btn = document.createElement('button');
  btn.className = 'play-btn';
  btn.innerHTML = '&#9654;';
  btn.setAttribute('aria-label', 'Play ' + q.file);

  const label = document.createElement('span');
  label.className = 'question-label';
  label.textContent = q.label;

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.innerHTML = '📋';
  copyBtn.title = 'Copy question';
  copyBtn.setAttribute('aria-label', 'Copy question');

  const qText = document.createElement('div');
  qText.className = 'question-text';
  qText.textContent = q.question;

  header.appendChild(btn);
  header.appendChild(copyBtn);
  header.appendChild(label);
  header.appendChild(qText);

  const speedGroup = document.createElement('div');
  speedGroup.className = 'speed-group';

  const speeds = [1, 1.5, 2];
  const speedBtns = [];
  speeds.forEach((s) => {
    const sb = document.createElement('button');
    sb.className = 'speed-btn' + (s === 1 ? ' active' : '');
    sb.textContent = s + 'x';
    sb.dataset.speed = s;
    speedBtns.push(sb);
    speedGroup.appendChild(sb);

    sb.addEventListener('click', (e) => {
      e.stopPropagation();
      audio.playbackRate = s;
      speedBtns.forEach((b) => b.classList.remove('active'));
      sb.classList.add('active');
    });
  });

  header.appendChild(speedGroup);

  const body = document.createElement('div');
  body.className = 'card-body';

  const answer = document.createElement('div');
  answer.className = 'answer-text';
  const lines = q.answer.split('\n').filter(l => l.trim());
  if (lines.length > 1) {
    const ul = document.createElement('ul');
    ul.style.listStyle = 'none';
    ul.style.padding = '0';
    ul.style.margin = '0';
    lines.forEach(line => {
      const li = document.createElement('li');
      li.textContent = line;
      ul.appendChild(li);
    });
    answer.appendChild(ul);
  } else {
    answer.textContent = q.answer;
  }

  body.appendChild(answer);

  card.appendChild(header);
  card.appendChild(body);
  container.appendChild(card);

  const audio = new Audio(q.file);
  audio.preload = 'none';

  btn.addEventListener('click', (e) => {
    e.stopPropagation();

    if (currentAudio && currentAudio !== audio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      if (currentBtn) currentBtn.classList.remove('playing');
    }

    if (audio.paused) {
      audio.play().catch(() => {});
      btn.classList.add('playing');
      currentAudio = audio;
      currentBtn = btn;
    } else {
      audio.pause();
      audio.currentTime = 0;
      btn.classList.remove('playing');
      currentAudio = null;
      currentBtn = null;
    }
  });

  audio.addEventListener('ended', () => {
    btn.classList.remove('playing');
    if (currentAudio === audio) currentAudio = null;
    if (currentBtn === btn) currentBtn = null;
  });

  let open = false;
  header.addEventListener('click', (e) => {
    if (e.target.closest('.play-btn')) return;
    if (e.target.closest('.copy-btn')) return;
    open = !open;
    body.classList.toggle('open', open);
  });

  copyBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    navigator.clipboard.writeText(q.question).then(() => {
      copyBtn.innerHTML = '✅';
      setTimeout(() => { copyBtn.innerHTML = '📋'; }, 1500);
    }).catch(() => {
      copyBtn.innerHTML = '❌';
      setTimeout(() => { copyBtn.innerHTML = '📋'; }, 1500);
    });
  });
});

function toRomaji(text) {
  let r = '';
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    const next = text[i + 1];
    // Handle small kana combinations
    if (next && 'ゃゅょャュョ'.includes(next)) {
      const pair = ch + next;
      r += kanaToRomaji[pair] || (kanaToRomaji[ch] || ch) + (kanaToRomaji[next] || next);
      i++;
    } else {
      r += kanaToRomaji[ch] === '' ? '' : (kanaToRomaji[ch] || ch);
    }
  }
  return r;
}

const searchInput = document.getElementById('searchInput');
const allCards = container.querySelectorAll('.card');

// Precompute romaji versions
const romajiCache = questions.map(q => ({
  question: toRomaji(q.question).toLowerCase(),
  answer: toRomaji(q.answer).toLowerCase()
}));

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  let count = 0;
  allCards.forEach((card, i) => {
    const data = questions[i];
    const r = romajiCache[i];
    const match = !q ||
      data.question.toLowerCase().includes(q) ||
      data.answer.toLowerCase().includes(q) ||
      data.label.toLowerCase().includes(q) ||
      data.file.toLowerCase().includes(q) ||
      r.question.includes(q) ||
      r.answer.includes(q);
    card.style.display = match ? '' : 'none';
    if (match) count++;
  });
  searchInput.style.borderColor = count === 0 && q ? '#e74c3c' : '';
});

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

  if (!window.speechSynthesis) {
    pStatus.textContent = '⚠ Speech not available on this browser';
    return;
  }
  try {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'ja-JP';
    utterance.rate = practiceSpeed;
    utterance.pitch = 1;
    if (jaVoice) utterance.voice = jaVoice;

    let started = false;
    let ended = false;
    if (onStart) {
      utterance.onstart = () => { started = true; onStart(); };
      setTimeout(() => { if (!started && window.speechSynthesis.speaking) { started = true; onStart(); } }, 500);
    }
    if (onEnd) {
      utterance.onend = () => { ended = true; onEnd(); };
      setTimeout(() => {
        if (!ended && window.speechSynthesis.speaking === false) { ended = true; onEnd(); }
      }, Math.max(3000, text.length * 80 / practiceSpeed));
    }
    window.speechSynthesis.speak(utterance);
    if (window.speechSynthesis.paused) {
      window.speechSynthesis.resume();
    }
  } catch (e) {
    pStatus.textContent = '⚠ TTS error: ' + e.message;
    if (onEnd) onEnd();
  }
}

function startPractice() {
  if (!window.speechSynthesis) {
    pStatus.textContent = '⚠ Speech synthesis not supported on this browser';
    return;
  }
  practiceQueue = shuffle([...questions]);
  practiceIndex = 0;
  pSearchInput.value = '';
  practiceOverlay.classList.add('active');
  aiBtn.disabled = true;
  showPracticeQuestion();
}

function showPracticeQuestion() {
  if (practiceQueue.length === 0) return;
  if (practiceIndex >= practiceQueue.length) practiceIndex = 0;
  const q = practiceQueue[practiceIndex];
  pLabel.textContent = 'Q' + q.label;
  pQuestion.textContent = q.question;
  pAnswerText.classList.remove('show');
  pAnswerText.dataset.rawAnswer = q.answer;
  renderAnswerSentences(q.answer);
  pStatus.textContent = 'Press "Speak Question" to hear the AI ask';
  pSpeak.textContent = '🔊 Speak Question';
  pSpeak.classList.remove('listening');
  pSpeakAnswer.textContent = '🔊 Speak Answer';
  window.speechSynthesis.cancel();
  isSpeaking = false;
  isAnswerSpeaking = false;
  pAnswerText.dataset.rawAnswer = '';
}

function renderAnswerSentences(text) {
  pAnswerText.innerHTML = '';
  const sentences = text.split('\n').filter(s => s.trim());
  if (sentences.length === 0) {
    pAnswerText.innerHTML = '<div class="p-answer-sentence">' + text + '</div>';
    return;
  }
  sentences.forEach(s => {
    const div = document.createElement('div');
    div.className = 'p-answer-sentence';
    div.textContent = s.trim();
    pAnswerText.appendChild(div);
  });
}

pSpeak.addEventListener('click', () => {
  if (isSpeaking) {
    window.speechSynthesis.cancel();
    pSpeak.textContent = '🔊 Speak Question';
    pSpeak.classList.remove('listening');
    pStatus.textContent = 'Press "Speak Question" to hear the AI ask';
    isSpeaking = false;
    return;
  }

  speakText(
    pQuestion.textContent,
    () => {
      isSpeaking = true;
      pSpeak.textContent = '⏹ Stop';
      pSpeak.classList.add('listening');
      pStatus.textContent = 'AI is asking... listen carefully';
    },
    () => {
      isSpeaking = false;
      pSpeak.textContent = '🔊 Speak Again';
      pSpeak.classList.remove('listening');
      pStatus.textContent = 'Now try to answer! Then check the sample answer.';
    }
  );
});

pSpeakAnswer.addEventListener('click', () => {
  if (isAnswerSpeaking) {
    window.speechSynthesis.cancel();
    pSpeakAnswer.textContent = '🔊 Speak Answer';
    isAnswerSpeaking = false;
    return;
  }

  const text = pAnswerText.dataset.rawAnswer || pAnswerText.textContent;
  if (!text) return;

  speakText(
    text,
    () => {
      isAnswerSpeaking = true;
      pSpeakAnswer.textContent = '⏹ Stop';
      pStatus.textContent = 'AI is reading the sample answer...';
    },
    () => {
      isAnswerSpeaking = false;
      pSpeakAnswer.textContent = '🔊 Speak Answer';
      pStatus.textContent = 'Compare your answer with the sample';
    },
    true
  );
});

pAnswer.addEventListener('click', () => {
  pAnswerText.classList.add('show');
  pStatus.textContent = 'Compare your answer with the sample above';
});

pNext.addEventListener('click', () => {
  practiceIndex++;
  showPracticeQuestion();
});

pClose.addEventListener('click', () => {
  window.speechSynthesis.cancel();
  practiceOverlay.classList.remove('active');
  aiBtn.disabled = false;
});

aiBtn.addEventListener('click', startPractice);

// ── Practice speed control ──
const pSpeedDown = document.getElementById('pSpeedDown');
const pSpeedUp = document.getElementById('pSpeedUp');
const pSpeedValue = document.getElementById('pSpeedValue');

pSpeedDown.addEventListener('click', () => {
  practiceSpeed = Math.max(0.25, +(practiceSpeed - 0.25).toFixed(2));
  pSpeedValue.textContent = practiceSpeed.toFixed(2) + '×';
});

pSpeedUp.addEventListener('click', () => {
  practiceSpeed = Math.min(3, +(practiceSpeed + 0.25).toFixed(2));
  pSpeedValue.textContent = practiceSpeed.toFixed(2) + '×';
});

// ── Practice search ──
const practiceRomajiCache = questions.map(q => ({
  question: toRomaji(q.question).toLowerCase(),
  answer: toRomaji(q.answer).toLowerCase()
}));

pSearchInput.addEventListener('input', () => {
  const q = pSearchInput.value.trim().toLowerCase();
  if (!q) {
    practiceQueue = shuffle([...questions]);
    practiceIndex = 0;
    showPracticeQuestion();
    pStatus.textContent = 'Press "Speak Question" to hear the AI ask';
    return;
  }
  const filtered = questions.filter((item, i) =>
    item.question.toLowerCase().includes(q) ||
    item.answer.toLowerCase().includes(q) ||
    item.label.toLowerCase().includes(q) ||
    practiceRomajiCache[i].question.includes(q) ||
    practiceRomajiCache[i].answer.includes(q)
  );
  if (filtered.length === 0) {
    pLabel.textContent = '—';
    pQuestion.textContent = 'No matching questions';
    pAnswerText.classList.remove('show');
    pAnswerText.textContent = '';
    pStatus.textContent = 'Try a different search term';
    pSpeak.disabled = true;
    pSpeakAnswer.disabled = true;
    practiceQueue = [];
    return;
  }
  pSpeak.disabled = false;
  pSpeakAnswer.disabled = false;
  practiceQueue = shuffle(filtered);
  practiceIndex = 0;
  showPracticeQuestion();
});
// ── Dark/Light mode toggle ──
const themeBtn = document.getElementById('themeBtn');
if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark');
  themeBtn.textContent = '☀️';
}
themeBtn.addEventListener('click', () => {
  document.body.classList.toggle('dark');
  const isDark = document.body.classList.contains('dark');
  themeBtn.textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});
</script>
</body>
